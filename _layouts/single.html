---
layout: default
---

<div class="page-content">
  {% if page.author_profile %}
  <aside class="sidebar">
    {% include author-profile.html %}
  </aside>
  {% endif %}

  <article class="page">
    {% if page.title %}
    <header class="page-header">
      <h1 class="page-title">{{ page.title }}</h1>
    </header>
    {% endif %}

    <div class="page-body">
      {{ content }}
    </div>
  </article>
</div>
