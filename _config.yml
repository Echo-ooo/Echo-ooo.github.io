# Site Settings
title: "Ethan's Personal Page"
name: "Ethan"
description: "Personal academic website"
url: "https://Echo-ooo.github.io"
baseurl: ""
repository: "Echo-ooo/Echo-ooo.github.io"

# Site Author
author:
  name: "Ethan"
  avatar: "images/profile.jpg"
  bio: "Autonomous Driving Engineer"
  location: "Your Location"
  email: "your.email@example.com"
  github: "Echo-ooo"
  linkedin: ""
  googlescholar: ""
  orcid: ""

# Reading Files
include:
  - .htaccess
  - _pages
exclude:
  - vendor
  - .git
  - .github
  - node_modules
  - Gemfile
  - Gemfile.lock
  - README.md

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:categories/:title/

# Collections
collections:
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate
